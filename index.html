<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة الشروق لمستلزمات الأسنان</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', sans-serif; }
body { background: #f5f5f5; }
header { background: #1e88e5; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; }
.admin-bar { background: #ff9800; padding: 10px; text-align: center; }
.admin-bar button { background: white; color: #ff9800; border: none; padding: 8px 15px; border-radius: 6px; margin: 5px; cursor: pointer; font-weight: bold; }
.search-box { padding: 15px; background: white; }
.search-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
.container { padding: 15px; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.card { background: white; border-radius: 10px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; text-align: center; display: flex; flex-direction: column; gap: 8px; }
.card-img-box { width: 100%; height: 120px; background: #f0f0f0; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.card img { width: 100%; height: 100%; object-fit: cover; }
.card h3 { font-size: 14px; color: #333; line-height: 1.4; min-height: 38px; }
.card p { color: #1e88e5; font-weight: bold; font-size: 16px; }
.details-page { display: none; padding: 15px; background: white; min-height: 100vh; }
.back-btn { background: #1e88e5; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
.details-page img { width: 100%; max-height: 300px; object-fit: contain; margin: 15px 0; background: #f0f0f0; border-radius: 8px; }
.details-page h2 { color: #333; margin: 10px 0; }
.details-page.price { font-size: 24px; color: #1e88e5; font-weight: bold; margin: 15px 0; }
.add-cart-btn { width: 100%; background: #4caf50; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; }
.no-results { text-align: center; padding: 50px; color: #999; }

/* لوحة الأدمن */
#adminPanel { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; overflow-y: auto; }
.admin-content { background: white; margin: 20px; padding: 20px; border-radius: 10px; }
.admin-content h3 { margin-bottom: 15px; color: #333; }
.admin-content input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
.admin-content button { background: #1e88e5; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; margin: 8px 0; cursor: pointer; font-size: 16px; }
.admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
.admin-list-item button { width: auto; background: #f44336; padding: 5px 10px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>شركة الشروق لمستلزمات الأسنان</h1>
</header>

<div class="admin-bar">
  <button onclick="openAdmin()">⚙️ إدارة المنتجات</button>
  <button onclick="exportData()">📥 تصدير نسخة</button>
  <button onclick="document.getElementById('importFile').click()">📤 استرجاع نسخة</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div id="listPage">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن منتج... بنج، كومبوزت، جوانتي">
  </div>
  <div class="container">
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<div id="detailsPage" class="details-page">
  <button class="back-btn" onclick="showList()">← رجوع للقائمة</button>
  <div id="detailsContent"></div>
</div>

<!-- لوحة الأدمن -->
<div id="adminPanel">
  <div class="admin-content">
    <h3>لوحة تحكم الأدمن</h3>
    <input id="pName" placeholder="اسم المنتج">
    <input id="pPrice" type="number" placeholder="السعر">
    <input id="pImg" placeholder="لينك الصورة">
    <input id="pCat" placeholder="القسم - بنج، كومبوزت...">
    <button onclick="addProduct()">➕ إضافة منتج</button>
    <hr style="margin:15px 0">
    <h4>المنتجات الحالية:</h4>
    <div id="adminList"></div>
    <button onclick="closeAdmin()" style="background:#666">إغلاق</button>
  </div>
</div>

<script>
// تحميل الداتا من localStorage أو داتا افتراضية أول مرة
let products = JSON.parse(localStorage.getItem('shorouk_products')) || [
  { id: 1, name: "بنج ليدوكايين 2%", price: 85, category: "بنج", image: "https://via.placeholder.com/150/4caf50/ffffff?text=بنج" },
  { id: 2, name: "كومبوزت 3M Z350", price: 1200, category: "كومبوزت", image: "https://via.placeholder.com/150/2196f3/ffffff?text=كومبوزت" },
  { id: 3, name: "جوانتي لاتكس M", price: 45, category: "جوانتيات", image: "https://via.placeholder.com/150/ff9800/ffffff?text=جوانتي" }
];

// حفظ في localStorage
function saveData() {
  localStorage.setItem('shorouk_products', JSON.stringify(products));
}

// عرض المنتجات
function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  if(list.length === 0) {
    grid.innerHTML = '<div class="no-results">مفيش منتجات بالاسم ده</div>';
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="card" onclick="showDetails(${p.id})">
      <div class="card-img-box">
        <img src="${p.image}" alt="" onerror="this.src='https://via.placeholder.com/150/cccccc/ffffff?text=لا+صورة'">
      </div>
      <h3>${p.name}</h3>
      <p>${p.price} جنيه</p>
    </div>
  `).join('');
}

// البحث
document.getElementById('searchInput').addEventListener('input', function(e) {
  const search = e.target.value.toLowerCase().trim();
  const filtered = products.filter(p => p.name.toLowerCase().includes(search));
  renderProducts(filtered);
});

// صفحة التفاصيل
function showDetails(id) {
  const product = products.find(p => p.id === id);
  document.getElementById('listPage').style.display = 'none';
  document.getElementById('detailsPage').style.display = 'block';
  document.getElementById('detailsContent').innerHTML = `
    <img src="${product.image}" onerror="this.src='https://via.placeholder.com/150/cccccc/ffffff?text=لا+صورة'">
    <h2>${product.name}</h2>
    <p>القسم: ${product.category}</p>
    <div class="price">${product.price} جنيه</div>
    <button class="add-cart-btn" onclick="alert('تم إضافة المنتج للسلة')">أضف للسلة</button>
  `;
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('detailsPage').style.display = 'none';
  document.getElementById('listPage').style.display = 'block';
  window.scrollTo(0, 0);
}

// ========== لوحة الأدمن ==========
function openAdmin() {
  let pass = prompt('ادخل كود الأدمن:');
  if(pass === '1234') {
    document.getElementById('adminPanel').style.display = 'block';
    showAdminList();
  } else if(pass) {
    alert('كود غلط!');
  }
}

function closeAdmin() {
  document.getElementById('adminPanel').style.display = 'none';
}

function addProduct() {
  let name = document.getElementById('pName').value.trim();
  let price = document.getElementById('pPrice').value;
  let img = document.getElementById('pImg').value.trim() || 'https://via.placeholder.com/150/cccccc/ffffff?text=لا+صورة';
  let cat = document.getElementById('pCat').value.trim() || 'عام';

  if(!name ||!price) {
    alert('اكتب الاسم والسعر');
    return;
  }

  products.push({id: Date.now(), name, price: parseFloat(price), category: cat, image: img});
  saveData();
  showAdminList();
  renderProducts(products);

  // فضي الحقول
  document.getElementById('pName').value = '';
  document.getElementById('pPrice').value = '';
  document.getElementById('pImg').value = '';
  document.getElementById('pCat').value = '';
  alert('تمت الإضافة بنجاح');
}

function deleteProduct(id) {
  if(confirm('متأكد عايز تحذف المنتج ده؟')) {
    products = products.filter(p => p.id!== id);
    saveData();
    showAdminList();
    renderProducts(products);
  }
}

function showAdminList() {
  document.getElementById('adminList').innerHTML = products.map(p => `
    <div class="admin-list-item">
      <span>${p.name} - ${p.price} ج</span>
      <button onclick="deleteProduct(${p.id})">🗑️ حذف</button>
    </div>
  `).join('');
}

// تصدير نسخة احتياطية
function exportData() {
  const dataStr = JSON.stringify(products, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'shorouk_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  alert('تم تحميل النسخة الاحتياطية. احفظ الملف ده كويس');
}

// استرجاع نسخة
function importData(event) {
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if(confirm('هتمسح كل المنتجات الحالية وترجع النسخة دي. موافق؟')) {
        products = imported;
        saveData();
        renderProducts(products);
        showAdminList();
        alert('تم استرجاع النسخة بنجاح');
      }
    } catch(err) {
      alert('الملف بايظ!');
    }
  };
  reader.readAsText(file);
}

// أول ما الصفحة تفتح
renderProducts(products);
</script>
</body>
</html>
