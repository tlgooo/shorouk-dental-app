<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1e3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>دليل الشروق – Dr. Bilal Al-Najashi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style> 
:root {
  --navy: #0f1e3d;
  --navy-mid: #1a3268;
  --navy-light: #2a4a9e;
  --gold: #c9a84c;
  --gold-light: #e8cc7a;
  --gold-pale: #f5e9c0;
  --gold-dark: #a07828;
  --white: #ffffff;
  --off: #f7f8fc;
  --surface: #ffffff;
  --text: #0f1e3d;
  --text-2: #4a5568;
  --text-3: #94a3b8;
  --border: rgba(15,30,61,0.10);
  --border-2: rgba(15,30,61,0.18);
  --r: 16px;
  --r-sm: 10px;
  --r-xs: 7px;
}
 
* { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--off);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
 
/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, #0a1428 0%, #0f1e3d 45%, #1a2f5a 100%);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity 0.6s ease;
}
#splash.out { opacity: 0; pointer-events: none; }
 
.splash-ring {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c9a84c22, #c9a84c44);
  border: 2px solid rgba(201,168,76,0.35);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  animation: pulse-ring 2s infinite;
  position: relative;
}
.splash-ring::before {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.15);
  animation: pulse-ring 2s infinite 0.3s;
}
@keyframes pulse-ring {
 0%,100%{transform:scale(1);opacity:1}
 50%{transform:scale(1.06);opacity:0.7}
.splash-icon { font-size: 48px; color: var(--gold); }
.splash-name {
  font-size: 32px; font-weight: 900;
  color: #fff; letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.splash-sub { font-size: 14px; color: rgba(201,168,76,0.9); font-weight: 400; margin-bottom: 48px; }
.splash-bar-wrap {
  width: 180px; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px; overflow: hidden;
}
.splash-bar {
  height: 100%; width: 0;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 99px;
  animation: fill-bar 1.8s ease forwards;
}
@keyframes fill-bar { to { width: 100%; } }
 
/* ===== TOPBAR ===== */
.topbar {
  background: linear-gradient(135deg, #0a1428 0%, #0f1e3d 55%, #162d5c 100%);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 rgba(201,168,76,0.2), 0 4px 20px rgba(10,20,40,0.4);
}
.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; color: var(--navy); font-weight: 900;
  flex-shrink: 0;
}
.logo-text h1 { font-size: 15px; font-weight: 800; color: #fff; line-height: 1.2; }
.logo-text p { font-size: 11px; color: rgba(201,168,76,0.85); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(201,168,76,0.25);
  color: #fff; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s; position: relative;
}
.icon-btn:hover { background: rgba(201,168,76,0.18); }
.cart-badge {
  position: absolute; top: -3px; left: -3px;
  background: var(--gold); color: var(--navy);
  font-size: 9px; font-weight: 900;
  width: 17px; height: 17px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
}
 
/* ===== SEARCH ===== */
.search-bar {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.search-inner {
  max-width: 640px; margin: 0 auto; position: relative;
}
.search-input {
  width: 100%; padding: 11px 44px 11px 44px;
  border: 1.5px solid var(--border-2); border-radius: 50px;
  font-family: 'Tajawal', sans-serif; font-size: 14px;
  color: var(--text); background: var(--off);
  outline: none; direction: rtl; transition: all 0.2s;
}
.search-input:focus { border-color: var(--navy-light); background: #fff; box-shadow: 0 0 0 3px rgba(42,74,158,0.1); }
.search-input::placeholder { color: var(--text-3); }
.search-ico { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 14px; pointer-events: none; }
.search-x { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 13px; cursor: pointer; display: none; }
 
/* ===== CATEGORIES ===== */
.cats-bar {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
}
.cats-scroll { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.cats-scroll::-webkit-scrollbar { display: none; }
.cat-chip {
  white-space: nowrap; padding: 6px 15px;
  border-radius: 50px; border: 1.5px solid var(--border-2);
  background: var(--off); color: var(--text-2);
  font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; flex-shrink: 0;
}
.cat-chip.active {
  background: var(--navy); color: #fff; border-color: var(--navy);
  box-shadow: 0 2px 8px rgba(15,30,61,0.22);
}
.cat-chip:hover:not(.active) { border-color: var(--navy-light); color: var(--navy-light); }
 
/* ===== PRODUCTS SECTION ===== */
.products-area { padding: 16px; max-width: 960px; margin: 0 auto; }
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-title { font-size: 16px; font-weight: 800; color: var(--navy); }
.sec-cnt { font-size: 13px; color: var(--text-3); background: var(--off); padding: 3px 10px; border-radius: 50px; }
 
/* ===== GRID LIST TOGGLE ===== */
.view-toggle { display: flex; gap: 4px; }
.view-btn {
  width: 32px; height: 32px; border-radius: var(--r-xs);
  border: 1.5px solid var(--border-2); background: var(--off);
  color: var(--text-3); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: all 0.18s;
}
.view-btn.on { background: var(--navy); border-color: var(--navy); color: #fff; }
 
/* ===== PRODUCT CARD – GRID ===== */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 14px; }
 
.pcard {
  background: #fff; border-radius: var(--r);
  border: 1.5px solid var(--border);
  overflow: hidden; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position: relative;
}
.pcard:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(15,30,61,0.13); border-color: var(--navy-light); }
 
/* Product image area */
.pimg {
  width: 100%; height: 130px;
  background: linear-gradient(135deg, #eef2ff 0%, #e0e8ff 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.pimg img { width: 100%; height: 100%; object-fit: cover; }
.pimg-emoji { font-size: 50px; }
 
/* Placeholder product images using SVG art */
.pimg-art {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
 
.cat-label {
  position: absolute; bottom: 7px; right: 7px;
  background: rgba(15,30,61,0.75); backdrop-filter: blur(6px);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 50px;
}
.badge-best {
  position: absolute; top: 8px; left: 8px;
  background: linear-gradient(135deg, #e8a000, #c97800);
  color: #fff; font-size: 10px; font-weight: 800;
  padding: 3px 9px; border-radius: 50px;
  display: flex; align-items: center; gap: 3px;
}
.badge-new {
  position: absolute; top: 8px; left: 8px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff; font-size: 10px; font-weight: 800;
  padding: 3px 9px; border-radius: 50px;
}
.badge-featured {
  position: absolute; top: 8px; left: 8px;
  background: linear-gradient(135deg, var(--navy-mid), var(--navy));
  color: var(--gold-light); font-size: 10px; font-weight: 800;
  padding: 3px 9px; border-radius: 50px;
  display: flex; align-items: center; gap: 3px;
}
 
.pbody { padding: 10px 12px 12px; }
.pname {
  font-size: 13px; font-weight: 700; color: var(--text);
  line-height: 1.4; margin-bottom: 2px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.pcode { font-size: 11px; color: var(--text-3); margin-bottom: 7px; }
.pprice { font-size: 16px; font-weight: 900; color: var(--gold-dark); }
.pprice span { font-size: 11px; font-weight: 500; color: var(--text-3); }
 
.pactions { display: flex; gap: 6px; margin-top: 9px; }
.btn-details {
  flex: 1; padding: 7px 6px;
  border: 1.5px solid var(--navy); border-radius: var(--r-xs);
  background: transparent; color: var(--navy);
  font-family: 'Tajawal', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.18s; text-align: center;
}
.btn-details:hover { background: var(--navy); color: #fff; }
.btn-addcart {
  width: 32px; height: 32px; border-radius: var(--r-xs);
  background: var(--gold); border: none; color: var(--navy);
  font-size: 13px; cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.btn-addcart:hover { background: var(--gold-dark); color: #fff; }
 
/* ===== LIST VIEW ===== */
.products-list { display: flex; flex-direction: column; gap: 10px; }
.prow {
  background: #fff; border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  transition: all 0.18s;
}
.prow:hover { border-color: var(--navy-light); box-shadow: 0 4px 14px rgba(15,30,61,0.09); }
.prow-img {
  width: 60px; height: 60px; border-radius: var(--r-xs);
  background: linear-gradient(135deg, #eef2ff, #e0e8ff);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden; font-size: 28px;
}
.prow-img img { width: 100%; height: 100%; object-fit: cover; }
.prow-info { flex: 1; min-width: 0; }
.prow-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prow-meta { font-size: 12px; color: var(--text-3); }
.prow-price { font-size: 15px; font-weight: 900; color: var(--gold-dark); white-space: nowrap; margin-left: 8px; flex-shrink: 0; }
.prow-btn {
  width: 34px; height: 34px; border-radius: var(--r-xs);
  background: var(--gold); border: none; color: var(--navy);
  font-size: 14px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
 
/* ===== DETAIL PAGE ===== */
.page { display: none; }
.page.active { display: block; }
 
.detail-topbar {
  background: linear-gradient(135deg, #0a1428, #0f1e3d);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 rgba(201,168,76,0.2);
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: none;
  color: #fff; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
}
.detail-topbar-title { color: #fff; font-size: 15px; font-weight: 700; }
 
.detail-wrap { max-width: 620px; margin: 0 auto; padding: 16px; }
 
.detail-img-box {
  width: 100%; height: 260px; border-radius: var(--r);
  background: linear-gradient(135deg, #eef2ff, #d5e3ff);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; margin-bottom: 18px;
  box-shadow: 0 4px 20px rgba(15,30,61,0.1);
  position: relative;
}
.detail-img-box img { width: 100%; height: 100%; object-fit: cover; }
.detail-img-emoji { font-size: 90px; }
 
.detail-card {
  background: #fff; border-radius: var(--r);
  border: 1.5px solid var(--border);
  padding: 20px; margin-bottom: 14px;
}
.detail-prod-name { font-size: 22px; font-weight: 900; color: var(--navy); margin-bottom: 14px; }
.drow { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
.drow:last-child { border: none; }
.dlabel { font-size: 13px; color: var(--text-3); }
.dval { font-size: 14px; font-weight: 700; }
.dprice-val { font-size: 24px; font-weight: 900; color: var(--gold-dark); }
 
.detail-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-wa {
  padding: 14px; border: none; border-radius: var(--r);
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff; font-family: 'Tajawal', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity 0.2s;
  box-shadow: 0 4px 16px rgba(37,211,102,0.28);
}
.btn-wa:hover { opacity: 0.9; }
.btn-gold {
  padding: 14px; border: none; border-radius: var(--r);
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
  color: var(--navy); font-family: 'Tajawal', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity 0.2s;
  box-shadow: 0 4px 16px rgba(201,168,76,0.28);
}
.btn-gold:hover { opacity: 0.9; }
 
/* ===== MODAL OVERLAY ===== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,20,40,0.65);
  backdrop-filter: blur(5px);
  z-index: 200; display: none;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
 
.sheet {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 620px; max-height: 88vh;
  display: flex; flex-direction: column;
  animation: slideUp 0.28s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
 
.sheet-hdr {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.sheet-title { font-size: 17px; font-weight: 800; color: var(--navy); }
.close-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--off); border: none; cursor: pointer;
  font-size: 14px; color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
}
.sheet-body { flex: 1; overflow-y: auto; padding: 14px 18px; }
.sheet-foot { padding: 14px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
 
/* ===== CART ===== */
.citem {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.citem-img {
  width: 52px; height: 52px; border-radius: var(--r-xs);
  background: linear-gradient(135deg, #eef2ff, #d5e3ff);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0; overflow: hidden;
}
.citem-img img { width: 100%; height: 100%; object-fit: cover; }
.citem-info { flex: 1; }
.citem-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.citem-price { font-size: 12px; color: var(--gold-dark); font-weight: 600; }
.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--border-2); background: #fff;
  color: var(--navy); font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.qty-n { font-size: 14px; font-weight: 800; min-width: 22px; text-align: center; }
 
.total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.total-lbl { font-size: 15px; font-weight: 600; color: var(--text-2); }
.total-val { font-size: 22px; font-weight: 900; color: var(--gold-dark); }
 
.btn-checkout {
  width: 100%; padding: 14px; border: none; border-radius: var(--r);
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: #fff; font-family: 'Tajawal', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 4px 16px rgba(15,30,61,0.25);
}
 
.empty-cart { text-align: center; padding: 50px 20px; color: var(--text-3); }
.empty-cart i { font-size: 52px; margin-bottom: 12px; display: block; }
.empty-cart p { font-size: 15px; font-weight: 600; }
 
/* ===== CHECKOUT FORM ===== */
.fg { margin-bottom: 14px; }
.fl { display: block; font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 5px; }
.fi, .fs {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border-2); border-radius: var(--r-xs);
  font-family: 'Tajawal', sans-serif; font-size: 14px; color: var(--text);
  background: var(--off); outline: none; direction: rtl; transition: border 0.2s;
}
.fi:focus, .fs:focus { border-color: var(--navy-light); background: #fff; }
.btn-send {
  width: 100%; padding: 14px; border: none; border-radius: var(--r);
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff; font-family: 'Tajawal', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-top: 6px; box-shadow: 0 4px 14px rgba(37,211,102,0.25);
}
 
/* ===== ADMIN MODAL ===== */
.admin-overlay .sheet { max-height: 95vh; }
.tab-row { display: flex; border-bottom: 1px solid var(--border); padding: 0 18px; flex-shrink: 0; }
.tab-btn {
  padding: 11px 14px; border: none; background: none;
  font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--text-3); cursor: pointer;
  border-bottom: 2.5px solid transparent; transition: all 0.2s;
}
.tab-btn.on { color: var(--navy); border-color: var(--navy); }
.tab-pane { display: none; }
.tab-pane.on { display: block; }
 
/* ADMIN STATS */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }
.stat-card {
  background: var(--off); border-radius: var(--r-sm);
  padding: 14px; text-align: center;
}
.stat-num { font-size: 24px; font-weight: 900; color: var(--navy); }
.stat-lbl { font-size: 12px; color: var(--text-3); margin-top: 2px; }
 
.img-drop {
  width: 100%; height: 130px;
  border: 2px dashed var(--border-2); border-radius: var(--r);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; gap: 6px; color: var(--text-3); margin-bottom: 14px;
  transition: border-color 0.2s; position: relative; overflow: hidden;
}
.img-drop:hover { border-color: var(--navy-light); }
.img-drop i { font-size: 26px; }
.img-drop p { font-size: 13px; }
.img-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.img-drop img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
 
.btn-save {
  width: 100%; padding: 13px; border: none; border-radius: var(--r);
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  color: #fff; font-family: 'Tajawal', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
}
 
.ap-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.ap-img {
  width: 44px; height: 44px; border-radius: var(--r-xs);
  background: linear-gradient(135deg, #eef2ff, #d5e3ff);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0; overflow: hidden;
}
.ap-img img { width: 100%; height: 100%; object-fit: cover; }
.ap-info { flex: 1; }
.ap-name { font-size: 13px; font-weight: 700; }
.ap-meta { font-size: 11px; color: var(--text-3); }
.btn-edit {
  width: 30px; height: 30px; border-radius: var(--r-xs);
  background: rgba(15,30,61,0.07); border: none;
  color: var(--navy); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
.btn-del {
  width: 30px; height: 30px; border-radius: var(--r-xs);
  background: rgba(220,53,69,0.08); border: none;
  color: #dc3545; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
 
.cat-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.add-cat-row { display: flex; gap: 8px; margin-top: 12px; }
.add-cat-input {
  flex: 1; padding: 10px 12px;
  border: 1.5px solid var(--border-2); border-radius: var(--r-xs);
  font-family: 'Tajawal', sans-serif; font-size: 13px; outline: none; direction: rtl;
}
.add-cat-input:focus { border-color: var(--navy-light); }
.btn-add-cat {
  padding: 10px 14px; background: var(--navy); border: none;
  border-radius: var(--r-xs); color: #fff;
  font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
}
 
/* ===== PASSWORD MODAL ===== */
.pass-veil {
  position: fixed; inset: 0; background: rgba(10,20,40,0.7);
  backdrop-filter: blur(6px); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.pass-veil.open { display: flex; }
.pass-box {
  background: #fff; border-radius: var(--r);
  padding: 32px 26px; width: 100%; max-width: 350px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(10,20,40,0.3);
}
.pass-box i { font-size: 40px; color: var(--navy); margin-bottom: 10px; }
.pass-box h2 { font-size: 19px; font-weight: 900; color: var(--navy); margin-bottom: 4px; }
.pass-box p { font-size: 13px; color: var(--text-3); margin-bottom: 18px; }
.pass-in {
  width: 100%; padding: 12px; border: 1.5px solid var(--border-2);
  border-radius: var(--r-xs); font-family: 'Tajawal', sans-serif;
  font-size: 20px; text-align: center; letter-spacing: 5px;
  margin-bottom: 8px; outline: none;
}
.pass-in:focus { border-color: var(--navy); }
.pass-err { color: #dc3545; font-size: 12px; margin-bottom: 10px; display: none; }
.btn-pass { width: 100%; padding: 12px; background: var(--navy); border: none; border-radius: var(--r-xs); color: #fff; font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
.btn-pass-cancel { width: 100%; padding: 9px; background: none; border: none; color: var(--text-3); font-family: 'Tajawal', sans-serif; font-size: 13px; cursor: pointer; }
 
/* ===== ADMIN BAR ===== */
.admin-bar {
  background: var(--off); border-bottom: 1px solid var(--border);
  padding: 7px 16px; display: flex; justify-content: flex-end;
}
.admin-link {
  font-size: 12px; color: var(--text-3); background: none;
  border: none; cursor: pointer; font-family: 'Tajawal', sans-serif;
  display: flex; align-items: center; gap: 4px;
}
.admin-link:hover { color: var(--navy); }
 
/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--navy); color: #fff;
  padding: 11px 22px; border-radius: 50px;
  font-size: 13px; font-weight: 600; z-index: 999;
  transition: transform 0.3s; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(10,20,40,0.3);
  border: 1px solid rgba(201,168,76,0.25);
}
.toast.show { transform: translateX(-50%) translateY(0); }
 
/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-3);
}
.empty-state i { font-size: 56px; margin-bottom: 14px; display: block; }
.empty-state h3 { font-size: 17px; font-weight: 700; margin-bottom: 5px; color: var(--text-2); }
.empty-state p { font-size: 13px; }
