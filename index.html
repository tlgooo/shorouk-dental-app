<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة الشروق لمستلزمات الأسنان</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', sans-serif; }
body { background: #f5f5f5; }
header { background: #1e88e5; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; }
.search-box { padding: 15px; background: white; }
.search-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
.container { padding: 15px; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.card { background: white; border-radius: 10px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
.card img { width: 100%; height: 120px; object-fit: contain; }
.card h3 { font-size: 14px; margin: 8px 0; color: #333; }
.card p { color: #1e88e5; font-weight: bold; }
.details-page { display: none; padding: 15px; background: white; min-height: 100vh; }
.back-btn { background: #1e88e5; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
.details-page img { width: 100%; max-height: 300px; object-fit: contain; margin: 15px 0; }
.details-page h2 { color: #333; margin: 10px 0; }
.details-page .price { font-size: 24px; color: #1e88e5; font-weight: bold; margin: 15px 0; }
.add-cart-btn { width: 100%; background: #4caf50; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; }
.no-results { text-align: center; padding: 50px; color: #999; }
</style>
</head>
<body>

<header>
  <h1>شركة الشروق لمستلزمات الأسنان</h1>
</header>

<!-- صفحة الليستة والبحث -->
<div id="listPage">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن منتج... بنج، كومبوزت، جوانتي">
  </div>
  <div class="container">
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<!-- صفحة التفاصيل -->
<div id="detailsPage" class="details-page">
  <button class="back-btn" onclick="showList()">← رجوع للقائمة</button>
  <div id="detailsContent"></div>
</div>

<script>
// دي الداتا المؤقتة - بعدين هنسحبها من Google Sheets
const products = [
  { id: 1, name: "بنج ليدوكايين 2%", price: 85, img: "https://via.placeholder.com/150", desc: "بنج موضعي للأسنان" },
  { id: 2, name: "كومبوزت 3M Z350", price: 1200, img: "https://via.placeholder.com/150", desc: "حشو تجميلي عالي الجودة" },
  { id: 3, name: "جوانتي لاتكس مقاس M", price: 45, img: "https://via.placeholder.com/150", desc: "علبة 100 جوانتي" },
  { id: 4, name: "سرنجة كربول", price: 25, img: "https://via.placeholder.com/150", desc: "سرنجة تخدير معدن" },
  { id: 5, name: "كحول طبي 70%", price: 30, img: "https://via.placeholder.com/150", desc: "زجاجة 500 مل" },
];

// دالة عرض المنتجات
function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  
  if(list.length === 0) {
    grid.innerHTML = '<div class="no-results">مفيش منتجات بالاسم ده</div>';
    return;
  }
  
  grid.innerHTML = list.map(p => `
    <div class="card" onclick="showDetails(${p.id})">
      <img src="${p.img}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.price} جنيه</p>
    </div>
  `).join('');
}

// دالة البحث - دي اللي كانت فيها المشكلة
document.getElementById('searchInput').addEventListener('input', function(e) {
  const search = e.target.value.toLowerCase().trim();
  const filtered = products.filter(p => p.name.toLowerCase().includes(search));
  renderProducts(filtered);
});

// دالة عرض التفاصيل
function showDetails(id) {
  const product = products.find(p => p.id === id);
  document.getElementById('listPage').style.display = 'none';
  document.getElementById('detailsPage').style.display = 'block';
  
  document.getElementById('detailsContent').innerHTML = `
    <img src="${product.img}" alt="${product.name}">
    <h2>${product.name}</h2>
    <p>${product.desc}</p>
    <div class="price">${product.price} جنيه</div>
    <button class="add-cart-btn" onclick="addToCart(${id})">أضف للسلة</button>
  `;
  
  window.scrollTo(0, 0);
}

// دالة الرجوع - دي اللي كانت ناقصة
function showList() {
  document.getElementById('detailsPage').style.display = 'none';
  document.getElementById('listPage').style.display = 'block';
  window.scrollTo(0, 0);
}

// دالة السلة مؤقتاً
function addToCart(id) {
  alert('تم إضافة المنتج للسلة');
}

// أول ما الصفحة تفتح اعرض كل المنتجات
renderProducts(products);
</script>

</body>
</html>
