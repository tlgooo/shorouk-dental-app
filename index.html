<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الشروق الاحترافي</title>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .page { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .page.active { display: block; }
        .s-inp { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .dropdown { background: white; border: 1px solid #ddd; margin-top: 5px; border-radius: 8px; display: none; }
        .dropdown.open { display: block; }
        .dd-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="page active" id="pageMain">
    <h1>الشروق لمستلزمات الأسنان</h1>
    <button onclick="showPage('pageCart')">السلة (<span id="cartCount">0</span>)</button>
    <hr>
    <input type="text" id="si" placeholder="ابحث عن منتج..." oninput="doSearch()">
    <div class="dropdown" id="dd"></div>
    <div id="pc" style="margin-top:20px; display:none;">
        <h2 id="pcName"></h2>
        <p>السعر: <span id="pcAmt"></span></p>
        <button onclick="addToCart()">إضافة للسلة</button>
        <button onclick="showPage('pageDetail')">عرض التفاصيل</button>
    </div>
</div>

<div class="page" id="pageDetail">
    <button onclick="showPage('pageMain')">⬅ عودة للرئيسية</button>
    <h2 id="detName"></h2>
    <p id="detDesc">وصف احترافي للمنتج يظهر هنا...</p>
    <button onclick="goWa()">اطلب عبر واتساب</button>
</div>

<div class="page" id="pageCart">
    <button onclick="showPage('pageMain')">⬅ استمرار التسوق</button>
    <h2>سلة المشتريات</h2>
    <div id="cartList"></div>
</div>

<script>
    const products = [
        { id: 1, name: "حشوة تجميلية", price: 250, desc: "حشوة عالية الجودة تدوم طويلاً" },
        { id: 2, name: "قالب طبعات", price: 120, desc: "قالب مرن وسهل الاستخدام" }
    ];

    let cart = [];
    let currentProduct = null;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function doSearch() {
        const query = document.getElementById('si').value.toLowerCase();
        const dd = document.getElementById('dd');
        const filtered = products.filter(p => p.name.includes(query));
        dd.innerHTML = filtered.map(p => `<div class="dd-item" onclick="selectProduct(${p.id})">${p.name}</div>`).join('');
        dd.classList.add('open');
    }

    function selectProduct(id) {
        currentProduct = products.find(p => p.id === id);
        document.getElementById('pc').style.display = 'block';
        document.getElementById('pcName').innerText = currentProduct.name;
        document.getElementById('pcAmt').innerText = currentProduct.price + " ج.م";
        document.getElementById('dd').classList.remove('open');
        // تحديث صفحة التفاصيل
        document.getElementById('detName').innerText = currentProduct.name;
    }

    function addToCart() {
        cart.push(currentProduct);
        document.getElementById('cartCount').innerText = cart.length;
        alert("تمت الإضافة للسلة!");
        updateCartList();
    }

    function updateCartList() {
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map(p => `<div class="cart-item">${p.name} - ${p.price} ج.م</div>`).join('');
    }

    function goWa() {
        window.open(`https://wa.me/201000000000?text=أريد طلب ${currentProduct.name}`, '_blank');
    }
</script>
</body>
</html>
